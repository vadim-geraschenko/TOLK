name: Migration QA

on:
  pull_request:
  push:
    branches: [ main, Operational/Tooling ]

jobs:
  visual-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CAPTURE_BASE_URL: http://127.0.0.1:3000
      CAPTURE_HOME_PATH: /
      CAPTURE_ABOUT_PATH: /about/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start app
        run: |
          nohup npm run start > /tmp/static-serve.log 2>&1 &
          for i in {1..60}; do
            if curl -sSf "${CAPTURE_BASE_URL}${CAPTURE_HOME_PATH}" > /dev/null && curl -sSf "${CAPTURE_BASE_URL}${CAPTURE_ABOUT_PATH}" > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Static server failed to start" >&2
          echo "Checked: ${CAPTURE_BASE_URL}${CAPTURE_HOME_PATH}" >&2
          echo "Checked: ${CAPTURE_BASE_URL}${CAPTURE_ABOUT_PATH}" >&2
          tail -n 100 /tmp/static-serve.log >&2 || true
          find out -maxdepth 3 -type f | sort | head -n 80 >&2 || true
          exit 1

      - name: Capture current snapshots
        run: |
          npm run current:home
          npm run current:about

      - name: Compare visual snapshots
        run: npm run compare:visual
